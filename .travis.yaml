sudo: required
services:
  - docker
before_install:
  - openssl aes-256-cbc -K $encrypted_661a34837a18_key -iv $encrypted_661a34837a18_iv -in multi-k8s-292502-25c3b653beab.json.enc -out multi-k8s-292502-25c3b653beab.json -d
  - curl https://sdk.cloud.google.com | bash > /dev/null;
  - source $HOME/google-cloud-sdk/path.bash.inc 
  - gcloud components update kubectl
  - gcloud auth activate-service-account --key-file service-account.json